<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gmail - Enterprise Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: 'Google Sans', sans-serif; background: #f6f8fc; overflow: hidden; height: 100vh; width: 100vw; }
        #loader { position: fixed; inset: 0; background: #ffffff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar { width: 200px; height: 4px; background: #f1f3f4; border-radius: 10px; overflow: hidden; margin-top: 24px; }
        .progress-fill { width: 0%; height: 100%; background: #0b57d0; animation: loading 2.5s infinite; }
        @keyframes loading { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #f6f8fc; z-index: 100; transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 0 24px 24px 0; }
        .sidebar.active { left: 0; box-shadow: 25px 0 50px rgba(0,0,0,0.1); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); opacity: 0; visibility: hidden; z-index: 90; transition: 0.3s; }
        .overlay.active { opacity: 1; visibility: visible; }
        .main-content { height: calc(100vh - 64px); display: flex; flex-direction: column; background: #ffffff; border-radius: 24px 24px 0 0; overflow: hidden; }
        .mail-item { transition: 0.2s; border-radius: 16px; margin: 4px 12px; cursor: pointer; position: relative; }
        .mail-item:active { background: #e8f0fe; transform: scale(0.98); }
        .timer-badge { background: #fce8e6; color: #b22a1d; padding: 6px 14px; border-radius: 12px; font-weight: 700; font-size: 12px; font-family: monospace; }
        .verified-label { font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; background: #e8f0fe; color: #1a73e8; }
        .owner-badge { background: #000; color: #00ff00; font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: 900; border: 1px solid #00ff00; }
    </style>
</head>
<body>

    <div id="loader"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" class="w-16"><div class="progress-bar"><div class="progress-fill"></div></div></div>

    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center bg-[#f0f4f9] px-6">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-2xl font-black text-gray-800 mb-6">Access Portal</h1>
            <input type="text" id="license-key" placeholder="MASUKKAN KEY" class="w-full p-5 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-2xl mb-6 outline-none text-center font-mono font-bold tracking-widest">
            <button onclick="validateKey()" class="w-full bg-[#0b57d0] text-white py-5 rounded-full font-black shadow-xl">MASUK</button>
        </div>
    </div>

    <div id="app-container" class="hidden h-screen flex flex-col">
        <header class="h-16 flex items-center justify-between px-4 bg-[#f6f8fc]">
            <div class="flex items-center gap-3">
                <button onclick="toggleSide()" class="p-3 text-gray-600"><i class="fas fa-bars"></i></button>
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" class="w-7">
                <span class="text-lg font-medium" id="app-title">Inbox</span>
            </div>
            <div class="flex items-center gap-2">
                <div id="countdown" class="timer-badge">00:00:00</div>
                <div id="owner-mark" class="hidden owner-badge animate-pulse">OWNER</div>
            </div>
        </header>

        <div class="flex-1 relative overflow-hidden flex">
            <div class="overlay" onclick="toggleSide()"></div>
            <aside class="sidebar p-4">
                <div class="flex items-center gap-4 bg-[#c2e7ff] p-5 rounded-2xl mb-6"><i class="fas fa-pencil-alt"></i><span class="font-bold">Tulis</span></div>
                <div class="space-y-1">
                    <div class="flex items-center justify-between px-6 py-4 bg-[#d3e3fd] text-[#041e49] font-black rounded-full">
                        <div class="flex items-center gap-4"><i class="fas fa-inbox"></i><span>Utama</span></div>
                        <span id="total-count">0</span>
                    </div>
                </div>
                <div id="owner-menu" class="hidden mt-10 pt-6 border-t border-gray-200">
                    <p class="text-[10px] font-black text-gray-400 mb-4 px-6 uppercase tracking-widest">Owner Panel</p>
                    <button onclick="prankUser()" class="flex items-center gap-4 px-6 py-4 text-orange-600 font-bold w-full"><i class="fas fa-ghost"></i><span>Isengin User</span></button>
                    <button onclick="wipeAll()" class="flex items-center gap-4 px-6 py-4 text-red-600 font-bold w-full"><i class="fas fa-trash-restore"></i><span>Wipe Inbox</span></button>
                </div>
            </aside>

            <main class="main-content flex-1 border-t border-gray-100">
                <div id="list-render" class="flex-1 overflow-y-auto pb-24"></div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, get, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://kodangz-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let isOwner = false;

        window.toggleSide = () => {
            document.querySelector('.sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        };

        window.onload = () => setTimeout(() => document.getElementById('loader').style.display='none', 1500);

        window.validateKey = async () => {
            const val = document.getElementById('license-key').value.trim();
            if(val === "AD-ADMIN") {
                isOwner = true;
                document.getElementById('owner-mark').classList.remove('hidden');
                document.getElementById('owner-menu').classList.remove('hidden');
                initApp(null);
                return;
            }

            const kRef = ref(db, `keys/${val.toUpperCase()}`);
            const snap = await get(kRef);
            if(snap.exists()){
                const d = snap.val();
                let exp = d.expiresAt || (Date.now() + (d.hours * 3600000));
                if(!d.expiresAt) await update(kRef, { expiresAt: exp, status: 'active' });
                onValue(kRef, (s) => { if(!s.exists()) location.reload(); });
                initApp(exp);
            } else {
                Swal.fire({ icon: 'error', title: 'Invalid Key' });
            }
        };

        function initApp(exp){
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');

            // Listen for Prank from Owner
            onValue(ref(db, 'system/alert'), (s) => {
                if(s.exists() && !isOwner) {
                    Swal.fire({ title: s.val().title, text: s.val().msg, icon: s.val().icon, backdrop: `rgba(255,0,0,0.4)` });
                }
            });

            if(exp) {
                setInterval(() => {
                    const diff = exp - Date.now();
                    if(diff <= 0) location.reload();
                    const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                    const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                    const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                    document.getElementById('countdown').innerText = `${h}:${m}:${s}`;
                }, 1000);
            } else {
                document.getElementById('countdown').innerText = "GOD MODE";
            }

            onValue(ref(db, 'inbox'), (s) => {
                const container = document.getElementById('list-render');
                container.innerHTML = '';
                if(s.exists()){
                    const data = s.val();
                    const keys = Object.keys(data).reverse();
                    document.getElementById('total-count').innerText = keys.length;
                    keys.forEach(id => {
                        const m = data[id];
                        container.innerHTML += `
                            <div class="mail-item flex items-center p-5 border-b border-gray-50 bg-white">
                                <div onclick="showDetail('${id}')" class="flex flex-1 items-center overflow-hidden">
                                    <div class="w-11 h-11 bg-blue-100 rounded-full flex items-center justify-center text-blue-700 font-bold mr-4">${m.label[0]}</div>
                                    <div class="flex-1 overflow-hidden">
                                        <h4 class="text-sm font-bold truncate">${m.label}</h4>
                                        <div class="flex items-center gap-2"><span class="verified-label">VERIFIED</span><span class="text-[9px] text-blue-500 font-black">${m.type}</span></div>
                                        <p class="text-xs text-gray-500 truncate">${m.email}</p>
                                    </div>
                                </div>
                                ${isOwner ? `<button onclick="delOne('${id}')" class="p-3 text-red-500"><i class="fas fa-trash"></i></button>` : ''}
                            </div>`;
                    });
                }
            });
        }

        window.showDetail = async (id) => {
            const snap = await get(ref(db, `inbox/${id}`));
            const m = snap.val();
            Swal.fire({
                title: `<div class="text-[10px] font-black uppercase text-gray-400 border-b pb-2">DATA DETAIL</div>`,
                html: `<div class="text-left space-y-3 mt-4 text-[13px]">
                    <div class="flex justify-between border-b pb-2"><span>Email</span><span class="font-bold">${m.email}</span></div>
                    <div class="flex justify-between border-b pb-2"><span>Pass</span><span class="font-bold text-red-500 font-mono">${m.pw}</span></div>
                    <div class="flex justify-between border-b pb-2"><span>Wilayah</span><span class="font-bold">${m.city || 'Secret'}</span></div>
                    <div class="flex justify-between border-b pb-2"><span>SIM</span><span class="font-bold text-blue-600">${m.isp || 'Secret'}</span></div>
                </div>`,
                confirmButtonText: 'COPY DATA'
            }).then(() => navigator.clipboard.writeText(`${m.email}:${m.pw}`));
        };

        // OWNER ACTIONS
        window.delOne = (id) => {
            if(confirm('Hapus data ini?')) remove(ref(db, `inbox/${id}`));
        };

        window.wipeAll = () => {
            if(confirm('WIPE SEMUA DATA?')) remove(ref(db, 'inbox'));
        };

        window.prankUser = () => {
            Swal.fire({
                title: 'Broadcast Prank',
                html: `<input id="p-title" class="swal2-input" placeholder="Title">
                       <input id="p-msg" class="swal2-input" placeholder="Message">`,
                showCancelButton: true,
                confirmButtonText: 'KIRIM KE SEMUA USER'
            }).then((res) => {
                if(res.isConfirmed) {
                    const title = document.getElementById('p-title').value;
                    const msg = document.getElementById('p-msg').value;
                    set(ref(db, 'system/alert'), { title, msg, icon: 'warning', ts: Date.now() });
                    setTimeout(() => remove(ref(db, 'system/alert')), 5000); // Hilang dalam 5 detik
                }
            });
        };
    </script>
</body>
</html>
